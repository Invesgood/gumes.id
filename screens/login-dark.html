<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#2e1413",
                        "on-surface-variant": "#d1c5b4",
                        "tertiary-fixed": "#ffdad7",
                        "surface": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "on-surface": "#e5e2e1",
                        "primary-container": "#c5a059",
                        "tertiary-fixed-dim": "#eabcb8",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "on-primary-container": "#4e3700",
                        "surface-container-highest": "#353534",
                        "on-background": "#e5e2e1",
                        "secondary-container": "#504745",
                        "primary": "#e9c176",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#261900",
                        "on-secondary-fixed": "#201a18",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed-dim": "#e9c176",
                        "surface-dim": "#131313",
                        "on-primary-fixed-variant": "#5d4201",
                        "on-secondary-fixed-variant": "#4d4542",
                        "surface-tint": "#e9c176",
                        "background": "#131313",
                        "inverse-primary": "#775a19",
                        "on-error": "#690005",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary": "#362f2c",
                        "secondary-fixed-dim": "#d0c4c0",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-container": "#c69b98",
                        "secondary": "#d0c4c0",
                        "on-tertiary-container": "#523331",
                        "outline": "#9a8f80",
                        "surface-variant": "#353534",
                        "primary-fixed": "#ffdea5",
                        "secondary-fixed": "#ede0dc",
                        "on-tertiary-fixed-variant": "#5f3e3c",
                        "outline-variant": "#4e4639",
                        "on-secondary-container": "#c2b6b2",
                        "surface-bright": "#393939",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#462827",
                        "tertiary": "#eabcb8",
                        "on-primary": "#412d00",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0rem",
                        "lg": "0rem",
                        "xl": "0rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .burnished-gradient {
            background: radial-gradient(circle at center, #e9c176 0%, #c5a059 100%);
        }
        .text-shadow-subtle {
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Login Shell Suppression: Per guidelines, we suppress nav for transactional pages -->
<main class="min-h-screen flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Background Artistic Element -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] rounded-full bg-primary-container/10 blur-[100px]"></div>
</div>
<div class="w-full max-w-md z-10 space-y-12">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center space-y-6">
<div class="relative group">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="filter_hdr">filter_hdr</span>
<div class="absolute inset-0 bg-primary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
</div>
<div class="space-y-2">
<h1 class="font-headline text-4xl font-bold tracking-widest text-primary text-shadow-subtle">GUMES.ID</h1>
<p class="font-label text-[10px] uppercase tracking-[0.3em] text-outline">Leather Atelier &amp; Curators</p>
</div>
</div>
<!-- Login Card (Intentional Depth through Tonal Nesting) -->
<div class="bg-surface-container p-8 md:p-12 shadow-[40px_0_100px_-20px_rgba(0,0,0,0.5)]">
<form class="space-y-8">
<div class="space-y-6">
<!-- Email Input -->
<div class="relative group">
<label class="font-label text-[10px] uppercase tracking-widest text-outline group-focus-within:text-primary transition-colors" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary placeholder:text-neutral-700 font-body transition-all" id="email" name="email" placeholder="artisan@gumes.id" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="flex justify-between items-end">
<label class="font-label text-[10px] uppercase tracking-widest text-outline group-focus-within:text-primary transition-colors" for="password">Password</label>
<a class="font-label text-[10px] uppercase tracking-widest text-neutral-500 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 text-on-surface focus:ring-0 focus:border-primary placeholder:text-neutral-700 font-body transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Section -->
<div class="pt-4 space-y-6">
<button class="w-full burnished-gradient py-4 text-on-primary-container font-label text-xs font-extrabold uppercase tracking-[0.2em] shadow-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                            Sign In to Atelier
                        </button>
<div class="flex items-center space-x-4">
<div class="flex-grow h-[1px] bg-outline-variant opacity-30"></div>
<span class="font-label text-[9px] uppercase tracking-widest text-outline">or authenticate with</span>
<div class="flex-grow h-[1px] bg-outline-variant opacity-30"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-sm group-hover:text-primary" data-icon="fingerprint">fingerprint</span>
<span class="font-label text-[10px] uppercase tracking-widest">Biometric</span>
</button>
<button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-sm group-hover:text-primary" data-icon="key">key</span>
<span class="font-label text-[10px] uppercase tracking-widest">Passkey</span>
</button>
</div>
</div>
</form>
</div>
<!-- Footer Link -->
<div class="text-center">
<p class="font-label text-xs tracking-wider text-outline">
                    Don't have an account? 
                    <a class="text-primary font-bold ml-2 underline underline-offset-8 decoration-primary/30 hover:decoration-primary transition-all" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Artistic Side Decoration (Asymmetric Layout) -->
<div class="hidden lg:block absolute left-12 top-1/2 -translate-y-1/2 rotate-[-90deg] origin-left">
<p class="font-label text-[10px] uppercase tracking-[0.5em] text-outline opacity-40">Hand-burnished Excellence • Established 2024 • GUMES.ID</p>
</div>
</main>
<!-- Contextual Footer (Suppressed Version for Login) -->
<footer class="w-full py-8 px-8 flex justify-center items-center border-t border-outline-variant/10">
<p class="font-body text-[10px] uppercase tracking-[0.2em] text-neutral-600">© 2024 GUMES.ID Leather Atelier</p>
</footer>
</body></html>
