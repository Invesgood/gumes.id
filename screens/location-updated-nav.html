</div>
<!-- Content Canvas -->
<section class="relative z-10 w-full max-w-2xl flex flex-col items-center text-center">
<!-- Elegant Checkmark Success Icon -->
<div class="mb-16 relative">
<div class="absolute inset-0 bg-[#e9c176] blur-3xl opacity-10 rounded-full"></div>
<div class="relative w-24 h-24 flex items-center justify-center border border-[#c5a059]/20">
<span class="material-symbols-outlined text-6xl text-[#e9c176] font-thin" style="font-variation-settings: 'wght' 100;">check</span>
</div>
</div>
<!-- Typography Shell -->
<div class="space-y-6">
<h2 class="text-4xl md:text-6xl font-['Noto_Serif'] font-light text-on-surface tracking-tight">
          Payment Successful
        </h2>
<p class="text-neutral-500 font-['Manrope'] text-sm md:text-base tracking-[0.1em] max-w-md mx-auto leading-relaxed">
          Your order is being prepared. Check your email for the receipt.
        </p>
</div>
<!-- Separator Gap (The Luxury of Space) -->
<div class="h-24"></div>
<!-- Action Cluster -->
<div class="w-full flex flex-col items-center gap-12">
<!-- Main CTA -->
<a class="gold-gradient px-12 py-5 text-[10px] font-['Manrope'] font-bold tracking-[0.2em] uppercase text-on-primary-container hover:brightness-110 transition-all duration-300" href="#">
          Back to Collections
        </a>
<!-- Secondary Information / Order Meta -->
<div class="grid grid-cols-2 gap-x-16 gap-y-2 opacity-60">
<div class="text-left">
<p class="text-[9px] uppercase tracking-widest text-[#c5a059]">Order ID</p>
<p class="text-xs font-['Manrope']">#GMS-881023</p>
</div>
<div class="text-left">
<p class="text-[9px] uppercase tracking-widest text-[#c5a059]">Arrival</p>
<p class="text-xs font-['Manrope']">3-5 Business Days</p>
</div>
</div>
</div>
</section>
</main>
